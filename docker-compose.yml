# Traefik routes by domain; host port is for direct IP access (preview / before DNS).
#
#   Domain:  https://ahnoudtech.com
#   Direct:  http://<server-ip>:3002
#
# On the server: copy to APP_DIR (e.g. /root/ahnoud). Set GitHub secret APP_DIR to the same path.
services:
  app:
    image: ghcr.io/cavidyrm/ahnoud:latest
    container_name: ahnoud
    restart: unless-stopped
    ports:
      - "3002:80"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.services.ahnoud.loadbalancer.server.port=80"
      - "traefik.http.routers.ahnoud.rule=Host(`ahnoudtech.com`) || Host(`www.ahnoudtech.com`)"
      - "traefik.http.routers.ahnoud.entrypoints=websecure"
      - "traefik.http.routers.ahnoud.tls=true"
      - "traefik.http.routers.ahnoud.tls.certresolver=myresolver"
      - "traefik.http.routers.ahnoud-http.rule=Host(`ahnoudtech.com`) || Host(`www.ahnoudtech.com`)"
      - "traefik.http.routers.ahnoud-http.entrypoints=web"
      - "traefik.http.routers.ahnoud-http.middlewares=ahnoud-redirect-https"
      - "traefik.http.middlewares.ahnoud-redirect-https.redirectscheme.scheme=https"

networks:
  traefik-public:
    external: true
